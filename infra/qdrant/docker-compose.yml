services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: worldcup-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-}"

volumes:
  qdrant_storage:
